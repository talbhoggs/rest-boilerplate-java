version: '3'
services:
    docker-mysql:
        container_name: docker-mysql
        image: mysql:8.4.8
        restart: always
        environment: 
            MYSQL_DATABASE: mydb
            MYSQL_ROOT_PASSWORD: password 
            MYSQL_ROOT_HOST: '%'
        #volumes:
        #    - ./sql:/docker-entrypoint-initdb.d
        ports:
            - 3306:3306
        healthcheck:
            test: "/usr/bin/mysql --user=root --password=password --execute \"SHOW DATABASES \""
            interval: 4s
            timeout: 20s
            retries: 5
        